<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo marrón -->
  <rect width="100" height="100" fill="#8B5E3C"/>
  
  <!-- Silla de madera simple pero visible -->
  <!-- Respaldo -->
  <rect x="30" y="15" width="40" height="45" rx="4" fill="none" stroke="#FFFFFF" stroke-width="4"/>
  
  <!-- Decoración del respaldo (líneas horizontales) -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#D4A853" stroke-width="2"/>
  <line x1="30" y1="45" x2="70" y2="45" stroke="#D4A853" stroke-width="2"/>
  
  <!-- Asiento -->
  <rect x="25" y="55" width="50" height="10" rx="2" fill="#FFFFFF"/>
  
  <!-- Patas (4 patas visibles) -->
  <rect x="28" y="65" width="6" height="20" rx="2" fill="#FFFFFF"/>
  <rect x="66" y="65" width="6" height="20" rx="2" fill="#FFFFFF"/>
  <rect x="40" y="65" width="5" height="20" rx="2" fill="#FFFFFF"/>
  <rect x="55" y="65" width="5" height="20" rx="2" fill="#FFFFFF"/>
</svg>